<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Font directory -->
  <dir>/opt/fonts</dir>

  <!-- Cache directory -->
  <cachedir>/tmp/fontconfig</cachedir>

  <!-- Periodic rescans -->
  <config>
    <rescan>5</rescan>
  </config>

  <!-- Generic fallbacks -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Liberation Sans</family>
      <family>Arial</family>
    </prefer>
  </alias>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <!-- Arial variants -->
  <alias>
    <family>Arial</family>
    <prefer>
      <family>Arial</family>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial Bold</family>
    <prefer>
      <family>Arial Bold</family>
      <family>Arial</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial Italic</family>
    <prefer>
      <family>Arial Italic</family>
      <family>Arial</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial Bold Italic</family>
    <prefer>
      <family>Arial Bold Italic</family>
      <family>Arial Italic</family>
    </prefer>
  </alias>

  <!-- Liberation Sans alias (handle no-space name and ensure resolution) -->
  <alias>
    <family>LiberationSans</family>
    <prefer>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Liberation Sans</family>
    <prefer>
      <family>Liberation Sans</family>
    </prefer>
  </alias>

  <!-- Rendering tweaks -->
  <match target="font">
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <match target="font">
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>
</fontconfig>