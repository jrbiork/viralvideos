<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Font directory -->
  <dir>/opt/fonts</dir>

  <!-- Cache -->
  <cachedir>/tmp/fontconfig</cachedir>

  <!-- Force periodic rescans (optional) -->
  <config>
    <rescan>5</rescan>
  </config>

  <!-- Aliases / fallback chain -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Arial</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial</family>
    <prefer>
      <family>Arial</family>
      <family>Liberation Sans</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial Bold</family>
    <prefer>
      <family>Arial Bold</family>
      <family>Liberation Sans Bold</family>
      <family>DejaVu Sans Bold</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial Italic</family>
    <prefer>
      <family>Arial Italic</family>
      <family>Liberation Sans Italic</family>
      <family>DejaVu Sans Oblique</family>
    </prefer>
  </alias>

  <alias>
    <family>Arial Bold Italic</family>
    <prefer>
      <family>Arial Bold Italic</family>
      <family>Liberation Sans Bold Italic</family>
      <family>DejaVu Sans BoldOblique</family>
    </prefer>
  </alias>

  <!-- Rendering tweaks -->
  <match target="font">
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <match target="font">
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>
</fontconfig>